# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: firecrawl
  version: "4.30.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/firecrawl-${{ version }}.tar.gz
  sha256: 9f72c641cdcb92b0f74dcb1fac01d01b25eaae6b56fc523d7e87bf6bf44a9d1a 

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - requests
    - httpx
    - python-dotenv
    - websockets
    - nest-asyncio
    - pydantic >=2.0
    - aiohttp

tests:
  - python:
      imports:
        - firecrawl
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python SDK for Firecrawl API
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/firecrawl/firecrawl
  repository: https://github.com/firecrawl/firecrawl

extra:
  recipe-maintainers:
    - soapy1

