schema_version: 1

context:
  version: "1.14.3"
  python_min: "3.10"

package:
  name: crewai
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/c/crewai/crewai-${{ version }}.tar.gz
    sha256: 8a7c403ac4ba48e24d5194255f8b638849cc395e7d5534ccef7d158ea45e963a

build:
  number: 0
  noarch: python
  python:
    entry_points:
      - crewai = crewai.cli.cli:crewai
  script: $PYTHON -m pip install . -v

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - pydantic >=2.11.9,<2.12
    - openai >=2.0.0,<3
    - instructor >=1.3.3
    - pdfplumber >=0.11.4,<0.12.0
    - regex >=2026.1.15,<2026.2.0
    - opentelemetry-api >=1.34.0,<1.35.0
    - opentelemetry-sdk >=1.34.0,<1.35.0
    - opentelemetry-exporter-otlp-proto-http >=1.34.0,<1.35.0
    - chromadb >=1.1.0,<1.2.0
    - tokenizers >=0.21,<1
    - openpyxl >=3.1.5,<3.2.0
    - python-dotenv >=1.2.2,<2
    - pyjwt >=2.9.0,<3
    - textual >=7.5.0
    - click >=8.1.7,<8.2.0
    - appdirs >=1.4.4,<1.5.0
    - jsonref >=1.1.0,<1.2.0
    - json-repair >=0.25.2,<0.26.0
    - tomli-w >=1.1.0,<1.2.0
    - tomli >=2.0.2,<2.1.0
    - json5 >=0.10.0,<0.11.0
    - portalocker >=2.7.0,<2.8.0
    - pydantic-settings >=2.10.1,<2.11.0
    - httpx >=0.28.1,<0.29.0
    - mcp >=1.26.0,<1.27.0
    - uv >=0.11.6,<0.12.0
    - python-uv # NOTE: Required to appease `pip check` for downstreams which (presently) might use `uv`
    - aiosqlite >=0.21.0,<0.22.0
    - pyyaml >=6.0,<7.0
    - aiofiles >=24.1.0,<24.2.0
    - lancedb >=0.29.2,<0.30.1

tests:
  - script:
      - crewai --help
      - python -c "import crewai"
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  summary: Cutting-edge framework for orchestrating role-playing, autonomous AI agents. By fostering collaborative intelligence, CrewAI empowers agents to work together seamlessly, tackling complex tasks.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/crewAIInc/crewAI

extra:
  recipe-maintainers:
    - soapy1
